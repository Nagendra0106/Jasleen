<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Jasleen</title>
    <style>
        :root {
            --primary-pink: #fce4ec;
            --deep-rose: #ad1457;
            --soft-gold: #d4a373;
            --text-gray: #5d4037;
        }

        body {
            margin: 0; 
            padding: 0;
            background: radial-gradient(circle, #ffffff 0%, var(--primary-pink) 100%);
            font-family: 'Optima', 'Georgia', serif;
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh; 
            overflow: hidden;
        }

        .container { 
            text-align: center; 
            max-width: 450px; 
            padding: 30px; 
            perspective: 1000px;
        }

        .name-header {
            color: var(--deep-rose);
            font-size: 2.2rem;
            font-weight: 300;
            margin-bottom: 20px;
            letter-spacing: 4px;
            text-shadow: 0 0 15px rgba(173, 20, 87, 0.2);
            animation: fadeIn 2s ease-in;
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        .bouquet-wrapper {
            position: relative;
            cursor: pointer;
            display: inline-block;
            animation: bloom 1.8s cubic-bezier(0.34, 1.56, 0.64, 1), heartbeat 3s ease-in-out infinite 2s;
            transition: transform 0.4s ease;
        }

        .bouquet-wrapper:hover {
            transform: translateY(-10px) rotate(1deg);
        }

        .lily-img {
            width: 100%;
            border-radius: 50px 50px 10px 10px;
            box-shadow: 0 20px 50px rgba(173, 20, 87, 0.2);
            border: 8px solid white;
        }

        .tap-note {
            position: absolute;
            top: 50%; 
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: rgba(255, 255, 255, 0.98);
            padding: 20px 25px;
            border-radius: 20px;
            color: var(--deep-rose);
            font-style: italic;
            font-size: 1.1rem;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            width: 85%;
            border-left: 5px solid var(--soft-gold);
            z-index: 10;
            pointer-events: none;
            line-height: 1.4;
        }

        .bouquet-wrapper:hover .tap-note,
        .bouquet-wrapper:active .tap-note {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        .text-box {
            margin-top: 30px;
            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 1.2s ease-out 1s forwards;
        }

        h1 { 
            color: var(--deep-rose); 
            font-size: 1.4rem; 
            font-weight: 300;
            letter-spacing: 1px;
        }

        p { 
            color: var(--text-gray); 
            line-height: 1.6; 
            font-size: 1.05rem;
        }

        .instruction {
            font-size: 0.8rem;
            color: var(--soft-gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 15px;
            display: block;
        }

        @keyframes bloom {
            0% { transform: scale(0) rotate(-10deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .sparkle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: var(--soft-gold);
            border-radius: 50%;
            opacity: 0.6;
            animation: float 4s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="name-header">I'll choose you Everyday Dear</div>
        
        <div class="bouquet-wrapper">
            <img src="https://i.pinimg.com/736x/19/f4/9f/19f49fa29ebbd132a71c3617b473980b.jpg" class="lily-img" alt="Lilies">
            
            <div class="tap-note">
                "Jasleen, your voice is the only melody my heart needs to hear."
            </div>
        </div>

        <div class="text-box">
            <h1>Something to match your light...</h1>
            <p>
                I was looking for a bouquet that could match the warmth of your voice, but since flowers don't have a volume knob, I chose these instead. 
                <br>
                <span class="instruction">Tap the flowers for a note</span>
            </p>
        </div>
    </div>

    <script>
        for (let i = 0; i < 15; i++) {
            let sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            sparkle.style.left = Math.random() * 100 + 'vw';
            sparkle.style.top = Math.random() * 100 + 'vh';
            sparkle.style.animationDelay = Math.random() * 5 + 's';
            document.body.appendChild(sparkle);
        }
    </script>
</body>
</html>
